<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Signing in...</title>
<style>
  body { font-family: -apple-system, sans-serif; display: flex; align-items: center;
         justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
  p { color: #555; font-size: 1.1rem; }
</style>
</head>
<body>
<p>Redirecting back to app...</p>
<script>
  // Facebook returns token in hash: #access_token=xxx&...
  // Query string for errors: ?error=xxx
  var hash   = window.location.hash.substring(1);
  var search = window.location.search.substring(1);
  var params = new URLSearchParams(hash || search);
  var token  = params.get('access_token');
  var error  = params.get('error') || params.get('error_description');

  if (token) {
    window.location.href = 'myapp://auth/callback?access_token=' + encodeURIComponent(token);
  } else if (error) {
    window.location.href = 'myapp://auth/callback?error=' + encodeURIComponent(error);
  } else {
    document.querySelector('p').textContent = 'No token received. You can close this window.';
  }
</script>
</body>
</html>
